<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: rounded square in royal blue -->
  <rect width="64" height="64" rx="14" fill="#2A46E8" />

  <!-- Thin aperture ring, a subtle nod to the camera-iris theme -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2" />

  <!-- Monogram: capital A for "Aperture" -->
  <text
    x="32"
    y="43"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    fill="#FFFFFF"
  >A</text>
</svg>
