<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aperture &mdash; Premium Image Gallery</title>
  <meta name="description" content="A premium, responsive image gallery in royal blue, white, grey and black, with category filtering and lightbox viewing." />

  <!-- Favicon / shortcut icon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="shortcut icon" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/favicon.svg" />

  <!-- Google Fonts: Fraunces (display serif) + Inter (body sans) + JetBrains Mono (counters) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header class="site-header">
    <div class="site-header__inner">
      <p class="site-header__eyebrow">A small collection</p>
      <h1 class="site-header__title">Aperture</h1>
      <p class="site-header__subtitle">Three rooms, one gallery &mdash; nature, architecture, and people, hung side by side.</p>
    </div>
  </header>

  <!-- ============ FILTER BAR ============ -->
  <!-- Category filter buttons. data-category="all" shows every item. -->
  <nav class="filter-bar" aria-label="Filter gallery by category">
    <div id="filterButtons" class="filter-bar__buttons">
      <button class="filter-btn is-active" type="button" data-category="all">
        All Work
      </button>
      <button class="filter-btn" type="button" data-category="nature">
        <span class="filter-btn__dot filter-btn__dot--nature"></span>Nature
      </button>
      <button class="filter-btn" type="button" data-category="architecture">
        <span class="filter-btn__dot filter-btn__dot--architecture"></span>Architecture
      </button>
      <button class="filter-btn" type="button" data-category="people">
        <span class="filter-btn__dot filter-btn__dot--people"></span>People
      </button>
    </div>
  </nav>

  <!-- ============ GALLERY GRID ============ -->
  <!-- Gallery items are injected by js/script.js from the imageData array,
       keeping markup, styling and content cleanly separated. -->
  <main>
    <section class="gallery" id="gallery" aria-label="Photo gallery">
      <!-- .gallery-item elements are generated here at runtime -->
    </section>

    <p class="gallery-empty" id="galleryEmpty" hidden>
      No photographs in this room yet. Try another category.
    </p>
  </main>

  <footer class="site-footer">
    <p>Built with HTML, CSS &amp; JavaScript &mdash; no frameworks, no dependencies.</p>
  </footer>

  <!-- ============ LIGHTBOX MODAL ============ -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Enlarged image viewer" hidden>
    <div class="lightbox__backdrop" id="lightboxBackdrop"></div>

    <div class="lightbox__stage">
      <button class="lightbox__close" id="lightboxClose" type="button" aria-label="Close viewer">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </button>

      <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev" type="button" aria-label="Previous image">
        <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
          <path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>

      <figure class="lightbox__figure">
        <img class="lightbox__image" id="lightboxImage" src="" alt="" />
        <figcaption class="lightbox__caption">
          <span class="lightbox__category" id="lightboxCategory"></span>
          <span class="lightbox__title" id="lightboxTitle"></span>
          <span class="lightbox__count" id="lightboxCount"></span>
        </figcaption>
      </figure>

      <button class="lightbox__nav lightbox__nav--next" id="lightboxNext" type="button" aria-label="Next image">
        <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
          <path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
